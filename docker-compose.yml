services:
  core-api:
    build:
      context: ./services/api
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      file-storage:
        condition: service_healthy
      bucket-provisioner:
        condition: service_completed_successfully
    ports:
      - "${API_BIND_HOST:-0.0.0.0}:${API_PORT:-8000}:8000"
    env_file:
      - .env
      - ./services/api/app/.env
    labels:
      logging: "promtail"
    networks:
      - internal

  stt-service:
    build:
      context: ./services/stt
    env_file:
      - ./services/stt/app/.env
    environment:
      IS_PROD: ${IS_PROD:-True}
      EXPLICIT_DEV_MODE: ${EXPLICIT_DEV_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TORCH_HOME: /model_cache
      XDG_CACHE_HOME: /model_cache
    volumes:
      - stt_cache:/model_cache
    networks:
      - internal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  database:
    image: postgres:18.2-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  file-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    volumes:
      - storage_data:/data
    networks:
      - internal
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:8.6.1-alpine
    volumes:
      - cache_data:/data
    networks:
      - internal
    command: >
      redis-server
      --requirepass ${CACHE_PASSWORD}
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CACHE_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  bucket-provisioner:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    entrypoint:
      - /bin/sh
      - -c
      - tr -d '\r' < /provision.sh > /tmp/provision.sh && /bin/sh /tmp/provision.sh
    depends_on:
      file-storage:
        condition: service_healthy
    environment:
      STORAGE_SERVICE_ENDPOINT: http://file-storage:9000
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
    restart: "no"
    networks:
      - internal
    volumes:
      - ./infra/storage/provision.sh:/provision.sh:ro

  prometheus:
    image: prom/prometheus:v3.9.1
    networks:
      - internal
    volumes:
      - prometheus_data:/prometheus
      - ./infra/observability/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.3
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    networks:
      - internal
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/logs/grafana/provisioning:/etc/grafana/provisioning:ro

  loki-init:
    image: alpine:3.20
    user: root
    command: sh -c "mkdir -p /loki/index /loki/index_cache && chown -R 10001:10001 /loki"
    networks:
      - internal
    volumes:
      - loki_index:/loki
    restart: "no"

  loki:
    image: grafana/loki:3.6.7
    user: "10001"
    depends_on:
      loki-init:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./infra/observability/logs/loki/config.yml:/etc/loki/local-config.yaml:ro
      - loki_index:/loki/index

  promtail:
    image: grafana/promtail:3.6.7
    depends_on:
      loki:
        condition: service_started
    networks:
      - internal
    volumes:
      - ./infra/observability/logs/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.0
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}?sslmode=disable"
    networks:
      - internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.81.0-alpine
    depends_on:
      cache:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://cache:6379
      REDIS_PASSWORD: ${CACHE_PASSWORD}
    networks:
      - internal

volumes:
  db_data:
  stt_cache:
  storage_data:
  cache_data:
  grafana_data:
  prometheus_data:
  loki_index:

networks:
  internal:
    driver: bridge
