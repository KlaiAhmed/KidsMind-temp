services:
  # Database Service
  db-service:
    image: postgres:18.2-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Postgres Exporter for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@db-service:5432/${DB_NAME}?sslmode=disable"
    depends_on:
      db-service:
        condition: service_healthy
    ports:
      - "${POSTGRES_EXPORTER_PORT}:9187"

  # Core API Service
  core-api:
    build:
      context: ./services/api
    depends_on:
      db-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      ai-service:
        condition: service_started
      stt-service:
        condition: service_started
    ports:
      - "${API_PORT}:8000"
    env_file:
      - .env
      - ./services/api/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/api/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude '**/.git/**' 
      --reload-exclude '**/__pycache__/**'

  # AI Service 
  ai-service:
    build:
      context: ./services/ai
    ports:
      - "${AI_PORT}:8000"
    env_file:
      - .env
      - ./services/ai/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/ai/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude '**/.git/**'

  # STT Service 
  stt-service:
    build:
      context: ./services/stt
    ports:
      - "${STT_PORT}:8000"
    env_file:
      - .env
      - ./services/stt/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/model_cache
      - TORCH_HOME=/model_cache
      - XDG_CACHE_HOME=/model_cache
    volumes:
      - ./services/stt/app:/app:rw
      - stt_cache:/model_cache
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Storage Service 
  storage-service:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    ports:
      - "${STORAGE_API_PORT}:9000"
      - "${STORAGE_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    volumes:
      - storage_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Bucket Provisioner Service
  bucket-service:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    entrypoint: ["/bin/sh", "/provision.sh"]
    depends_on:
      storage-service:
        condition: service_healthy
    environment:
      STORAGE_SERVICE_ENDPOINT: ${STORAGE_SERVICE_ENDPOINT}
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
    volumes:
      - ./infra/storage/provision.sh:/provision.sh

  # Prometheus Service
  prometheus:
    image: prom/prometheus:v3.9.1
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    
  # Grafana Service
  grafana:
    image: grafana/grafana:12.3
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana


volumes:
  db_data:
  stt_cache:
  storage_data:
  grafana_data:
  prometheus_data: