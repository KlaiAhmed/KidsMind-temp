services:
  # Database Service
  db:
    build: 
      context: ./infra/DB
    image: postgres-db
    container_name: postgres-db-container
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Core Service
  api-core:
    build:
      context: ./services/api
    depends_on:
      db:
        condition: service_healthy
    image: api-core
    container_name: api-core-container
    ports:
      - "${API_PORT}:8000"
    env_file: .env
    develop:
      watch:
        - action: sync
          path: ./services/api
          target: /app
          ignore:
            - app/.venv/
            - "**/__pycache__/"
            - Dockerfile
            - requirements.txt
            - .dockerignore
            - .env
        - action: rebuild
          path: ./services/api/requirements.txt

  # AI Service
  ai-service:
    build:
      context: ./services/ai
    image: ai-service
    container_name: ai-service-container
    ports:
      - "${AI_PORT}:8000"
    env_file: .env
    develop:
      watch:
        - action: sync
          path: ./services/ai
          target: /app
          ignore:
            - app/.venv/
            - "**/__pycache__/"
            - Dockerfile
            - requirements.txt
            - .dockerignore
            - .env
        - action: rebuild
          path: ./services/ai/requirements.txt

  # STT Service
  stt-service:
    build:
      context: ./services/stt
    image: stt-service
    container_name: stt-service-container
    ports:
      - "${STT_PORT}:8000"
    env_file: 
      - .env
      - ./services/stt/app/.env
    environment:
      - HF_HOME=/app/model_cache
    volumes:
      - stt_cache:/app/model_cache
    develop:
      watch:
        - action: sync
          path: ./services/stt
          target: /app
          ignore:
            - app/.venv/
            - "**/__pycache__/"
            - Dockerfile
            - requirements.txt
            - .dockerignore
            - .env
        - action: rebuild
          path: ./services/stt/requirements.txt

  # MinIO Service
  minio:
    build: 
      context: ./infra/storage
    image: minio-storage
    container_name: minio-storage-container
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  stt_cache:
  minio_data: