services:
  # Database Service
  db:
    image: postgres:18.2-alpine
    container_name: DB-service
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Core Service
  api-core:
    build:
      context: ./services/api
    container_name: api-core-service
    depends_on:
      db:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      ai-service:
        condition: service_started
      stt-service:
        condition: service_started
    ports:
      - "${API_PORT}:8000"
    env_file:
      - .env
      - ./services/api/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/api/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude '**/.git/**' 
      --reload-exclude '**/__pycache__/**'

  # AI Service 
  ai-service:
    build:
      context: ./services/ai
    ports:
      - "${AI_PORT}:8000"
    env_file:
      - .env
      - ./services/ai/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./services/ai/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload 
      --reload-dir /app 
      --reload-exclude '**/.git/**'

  # STT Service 
  stt-service:
    build:
      context: ./services/stt
    ports:
      - "${STT_PORT}:8000"
    env_file:
      - .env
      - ./services/stt/app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/model_cache
      - TORCH_HOME=/model_cache
      - XDG_CACHE_HOME=/model_cache
    volumes:
      - ./services/stt/app:/app:rw
      - stt_cache:/model_cache
    command: 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app 

  # Storage Service 
  storage-service:
    image: minio/minio:latest
    ports:
      - "${STORAGE_API_PORT}:9000"
      - "${STORAGE_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
    volumes:
      - storage_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Bucket Provisioner Service
  bucket-service:
    image: minio/mc
    entrypoint: ["/bin/sh", "/provision.sh"]
    depends_on:
      storage-service:
        condition: service_healthy
    environment:
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL}
      MINIO_ROOT_USER: ${STORAGE_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_ROOT_PASSWORD}
    volumes:
      - ./infra/storage/provision.sh:/provision.sh


volumes:
  db_data:
  stt_cache:
  storage_data: