<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function initializeReducedMotionFlag() {
        try {
          var prefersReduced =
            typeof window.matchMedia === 'function' &&
            window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          var reduceAnimationsRaw = window.localStorage.getItem('kidsmind_reduce_animations');
      var reduceAnimations = reduceAnimationsRaw === 'true';
          document.documentElement.setAttribute(
            'data-reduce-motion',
            reduceAnimations || prefersReduced ? 'true' : 'false'
          );
        } catch (error) {
          document.documentElement.setAttribute('data-reduce-motion', 'false');
        }
      })();
    </script>
    <title>KidsMind</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
