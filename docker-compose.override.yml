services:
  core-api:
    volumes:
      - ./services/api/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app
      --reload-exclude '**/.git/**'
      --reload-exclude '**/__pycache__/**'

  stt-service:
    volumes:
      - ./services/stt/app:/app:rw
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app
      --reload-exclude '**/.git/**'
      --reload-exclude '**/__pycache__/**'
